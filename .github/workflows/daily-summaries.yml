name: Daily Summaries

# Triggers /api/cron/daily-summaries on the deployed Fly app. The HTTP request
# wakes the machine and runs the job, independent of process state (replaces the
# old in-process node-cron, which silently skipped runs when Fly suspended).
#
# Goal: run once each evening (UTC). GitHub cron is UTC-only, so we schedule two
# candidate times to bracket the 21:00 London hour across DST (20:00 UTC during
# BST, 21:00 UTC during GMT). We intentionally do NOT gate on the wall clock:
# GitHub's scheduler is best-effort and routinely delays runs an hour or more,
# which used to push delayed runs past a strict London-hour gate and silently
# skip the work. Instead both triggers POST unconditionally — the endpoint upserts
# on (ticker, date) keyed to the UTC date, so the second run of the day is a
# harmless no-op and the job is immune to scheduling delays before 00:00 UTC.

on:
  schedule:
    - cron: '0 20 * * *' # ~21:00 London during BST (summer)
    - cron: '0 21 * * *' # ~21:00 London during GMT (winter)
  workflow_dispatch: {} # manual runs

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/daily-summaries
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            status=$(curl -sS -o /tmp/body -w '%{http_code}' \
              --max-time 180 -X POST \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              https://portseido-lite.fly.dev/api/cron/daily-summaries) || status=000
            echo "HTTP $status"
            cat /tmp/body || true
            echo
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "Failed after 3 attempts"
          exit 1
